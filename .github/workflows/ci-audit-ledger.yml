name: CI — Audit Ledger

on:
  push:
    branches: [main]
    paths:
      - "audit-ledger/**"
      - "proto/**"
      - ".github/workflows/ci-audit-ledger.yml"
  pull_request:
    paths:
      - "audit-ledger/**"
      - "proto/**"

concurrency:
  group: ci-audit-ledger-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/audit-ledger
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        working-directory: audit-ledger
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: audit-ledger

      - name: Run clippy
        working-directory: audit-ledger
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-22.04
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sentinel_audit_test
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: audit-ledger

      - name: Run tests
        working-directory: audit-ledger
        run: cargo test --all-features --verbose
        env:
          DATABASE_URL: "postgresql://sentinel:sentinel_test@127.0.0.1:5432/sentinel_audit_test"

  bench:
    name: Benchmarks
    needs: test
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sentinel_audit_bench
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel_bench
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: audit-ledger

      - name: Run benchmarks
        working-directory: audit-ledger
        run: cargo bench --all-features -- --output-format bencher | tee bench_output.txt
        env:
          DATABASE_URL: "postgresql://sentinel:sentinel_bench@127.0.0.1:5432/sentinel_audit_bench"

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: audit-ledger-benchmarks
          path: audit-ledger/bench_output.txt

  docker:
    name: Docker Image
    needs: [fmt, clippy, test]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: audit-ledger/packaging/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
