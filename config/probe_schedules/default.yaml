# =============================================================================
# SENTINEL Probe Schedule - Default
# =============================================================================
# Standard probe schedule balancing detection latency with overhead.
# Targets approximately 1-2% GPU overhead under normal conditions.

schedule:
  - type: FMA
    period_seconds: 60
    sm_coverage: 1.0
    priority: 1
    enabled: true
    timeout_ms: 500
    description: >
      Fused multiply-add determinism check. Tests all SMs every 60 seconds.
      This is the primary SDC detection probe with zero ULP tolerance.

  - type: TENSOR_CORE
    period_seconds: 60
    sm_coverage: 1.0
    priority: 1
    enabled: true
    timeout_ms: 1000
    description: >
      Tensor Core matrix-multiply reproducibility check. Tests all SMs every
      60 seconds. Critical for detecting SDC in mixed-precision training and
      inference workloads.

  - type: TRANSCENDENTAL
    period_seconds: 120
    sm_coverage: 0.5
    priority: 2
    enabled: true
    timeout_ms: 500
    description: >
      Transcendental function (sin, cos, exp, log) accuracy check. Tests 50%
      of SMs every 120 seconds for a full rotation every 240 seconds.

  - type: AES
    period_seconds: 300
    sm_coverage: 0.25
    priority: 3
    enabled: true
    timeout_ms: 2000
    description: >
      AES-based combinational logic exhaustive-path check. Tests 25% of SMs
      every 300 seconds for a full rotation every 1200 seconds. This probe
      exercises the integer ALU paths not covered by FMA/Tensor Core probes.

  - type: MEMORY
    period_seconds: 600
    sm_coverage: 1.0
    priority: 4
    enabled: true
    timeout_ms: 5000
    description: >
      GPU global memory integrity check using walking-ones and MATS+ patterns.
      Tests all accessible memory regions every 600 seconds. Higher overhead
      but critical for detecting stuck bits and addressing faults.

  - type: REGISTER_FILE
    period_seconds: 120
    sm_coverage: 1.0
    priority: 2
    enabled: true
    timeout_ms: 500
    description: >
      Register file integrity check via known-pattern writes and reads.
      Tests all SMs every 120 seconds. Detects stuck-at faults in the
      register file that could cause silent data corruption.

  - type: SHARED_MEMORY
    period_seconds: 300
    sm_coverage: 0.5
    priority: 3
    enabled: true
    timeout_ms: 1000
    description: >
      Shared memory integrity check using address-as-data and walking-ones
      patterns. Tests 50% of SMs every 300 seconds.
