version: "3.9"

# Integration test compose file.
# Usage: docker compose -f docker-compose.yml -f docker-compose.test.yml up --abort-on-container-exit

services:
  # Override correlation engine for test mode.
  correlation-engine:
    environment:
      SENTINEL_LOG_LEVEL: debug
      SENTINEL_CORRELATION_ENGINE_TLS_ENABLED: "false"
      SENTINEL_TESTING_ENABLED: "true"
      SENTINEL_CORRELATION_ENGINE_STATE_MACHINE_REQUIRE_APPROVAL: "false"
    # Faster health checks for tests.
    healthcheck:
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 15s

  # Override audit ledger for test mode.
  audit-ledger:
    environment:
      SENTINEL_LOG_LEVEL: debug
      SENTINEL_AUDIT_LEDGER_TLS_ENABLED: "false"
      SENTINEL_TESTING_ENABLED: "true"
    healthcheck:
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 15s

  # Lighter resource limits for testing.
  postgres:
    environment:
      POSTGRES_USER: sentinel_test
      POSTGRES_PASSWORD: sentinel_test
      POSTGRES_DB: sentinel_test
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel_test -d sentinel_test"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s

  redis:
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  scylladb:
    command: >
      --seeds=scylladb
      --smp 1
      --memory 512M
      --overprovisioned 1
      --api-address 0.0.0.0
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # Simulated probe agent for integration tests.
  test-probe-agent:
    image: sentinel/test-probe-agent:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.test-probe-agent
    container_name: sentinel-test-probe-agent
    environment:
      SENTINEL_LOG_LEVEL: debug
      SENTINEL_PROBE_AGENT_CORRELATION_ENGINE_ENDPOINT: "correlation-engine:50051"
      SENTINEL_PROBE_AGENT_TLS_ENABLED: "false"
      SENTINEL_TESTING_ENABLED: "true"
      SENTINEL_TEST_NUM_GPUS: "4"
      SENTINEL_TEST_SM_PER_GPU: "132"
      SENTINEL_TEST_FAULT_INJECTION: "true"
    networks:
      - sentinel-net
    depends_on:
      correlation-engine:
        condition: service_healthy
      audit-ledger:
        condition: service_healthy

  # Integration test runner.
  integration-tests:
    image: sentinel/integration-tests:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.integration-tests
    container_name: sentinel-integration-tests
    environment:
      SENTINEL_LOG_LEVEL: debug
      SENTINEL_CORRELATION_ENGINE_ENDPOINT: "correlation-engine:50051"
      SENTINEL_AUDIT_LEDGER_ENDPOINT: "audit-ledger:50052"
      SENTINEL_POSTGRES_URL: "postgresql://sentinel_test:sentinel_test@postgres:5432/sentinel_test?sslmode=disable"
      SENTINEL_REDIS_URL: "redis://redis:6379/0"
      SENTINEL_SCYLLA_CONTACT_POINTS: "scylladb:9042"
      SENTINEL_TEST_TIMEOUT_SECONDS: "300"
    networks:
      - sentinel-net
    depends_on:
      test-probe-agent:
        condition: service_started
      correlation-engine:
        condition: service_healthy
      audit-ledger:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      scylladb:
        condition: service_healthy

  # Disable observability stack during testing to save resources.
  prometheus:
    profiles:
      - observability

  grafana:
    profiles:
      - observability
