# =============================================================================
# SENTINEL Network Policies
# =============================================================================
# Implements a zero-trust network model within the sentinel namespace.
# Only explicitly allowed traffic is permitted.

# Default deny all ingress and egress in the sentinel namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: sentinel
  labels:
    app.kubernetes.io/part-of: sentinel-sdc
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---

# Allow DNS resolution for all pods in the namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: sentinel
  labels:
    app.kubernetes.io/part-of: sentinel-sdc
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---

# Correlation Engine: accept gRPC from probe agents and monitors; connect to databases.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: correlation-engine
  namespace: sentinel
  labels:
    app.kubernetes.io/name: correlation-engine
    app.kubernetes.io/part-of: sentinel-sdc
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: correlation-engine
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Accept gRPC from probe agents.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: probe-agent
      ports:
        - protocol: TCP
          port: 50051
    # Accept gRPC from inference monitors.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: inference-monitor
      ports:
        - protocol: TCP
          port: 50051
    # Accept gRPC from training monitors.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: training-monitor
      ports:
        - protocol: TCP
          port: 50051
    # Accept Prometheus scrapes.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 9090
  egress:
    # Connect to PostgreSQL.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Connect to ScyllaDB.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: scylladb
      ports:
        - protocol: TCP
          port: 9042
    # Connect to Redis.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    # Connect to Audit Ledger.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: audit-ledger
      ports:
        - protocol: TCP
          port: 50052

---

# Audit Ledger: accept gRPC from correlation engine; connect to ScyllaDB.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: audit-ledger
  namespace: sentinel
  labels:
    app.kubernetes.io/name: audit-ledger
    app.kubernetes.io/part-of: sentinel-sdc
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: audit-ledger
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Accept gRPC from correlation engine.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: correlation-engine
      ports:
        - protocol: TCP
          port: 50052
    # Accept Prometheus scrapes.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 9091
  egress:
    # Connect to ScyllaDB.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: scylladb
      ports:
        - protocol: TCP
          port: 9042

---

# Probe Agent: connect to correlation engine only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: probe-agent
  namespace: sentinel
  labels:
    app.kubernetes.io/name: probe-agent
    app.kubernetes.io/part-of: sentinel-sdc
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: probe-agent
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Accept Prometheus scrapes.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 9093
  egress:
    # Connect to correlation engine.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: correlation-engine
      ports:
        - protocol: TCP
          port: 50051

---

# PostgreSQL: accept connections from correlation engine only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres
  namespace: sentinel
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: sentinel-sdc
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgres
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: correlation-engine
      ports:
        - protocol: TCP
          port: 5432
  egress: []

---

# ScyllaDB: accept connections from correlation engine and audit ledger.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: scylladb
  namespace: sentinel
  labels:
    app.kubernetes.io/name: scylladb
    app.kubernetes.io/part-of: sentinel-sdc
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: scylladb
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: correlation-engine
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: audit-ledger
      ports:
        - protocol: TCP
          port: 9042
  egress:
    # ScyllaDB inter-node gossip (for multi-node clusters).
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: scylladb
      ports:
        - protocol: TCP
          port: 7000
        - protocol: TCP
          port: 7001

---

# Redis: accept connections from correlation engine only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis
  namespace: sentinel
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: sentinel-sdc
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: redis
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: correlation-engine
      ports:
        - protocol: TCP
          port: 6379
  egress: []

---

# Prometheus: can scrape all sentinel pods; Grafana can query it.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prometheus
  namespace: sentinel
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: sentinel-sdc
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: grafana
      ports:
        - protocol: TCP
          port: 9090
  egress:
    # Scrape all sentinel pods on their metrics ports.
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 9091
        - protocol: TCP
          port: 9093

---

# Grafana: can query Prometheus; accept external traffic on port 3000.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: grafana
  namespace: sentinel
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: sentinel-sdc
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Accept traffic from Ingress controller or direct access.
    - ports:
        - protocol: TCP
          port: 3000
  egress:
    # Connect to Prometheus.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 9090
