x-common-env: &common-env
  SENTINEL_LOG_LEVEL: info
  SENTINEL_LOG_FORMAT: json

services:
  # ---------------------------------------------------------------------------
  # Sentinel Core Services
  # ---------------------------------------------------------------------------

  correlation-engine:
    image: sentinel/correlation-engine:latest
    build:
      context: ../correlation-engine
      dockerfile: packaging/Dockerfile
    container_name: sentinel-correlation-engine
    restart: unless-stopped
    environment:
      <<: *common-env
      SENTINEL_CORRELATION_ENGINE_LISTEN_ADDRESS: "0.0.0.0:50051"
      SENTINEL_CORRELATION_ENGINE_DATABASE_POSTGRES_URL: "postgresql://sentinel:sentinel@postgres:5432/sentinel?sslmode=disable"
      SENTINEL_CORRELATION_ENGINE_SCYLLA_CONTACT_POINTS: "scylladb:9042"
      SENTINEL_CORRELATION_ENGINE_REDIS_URL: "redis://redis:6379/0"
      SENTINEL_CORRELATION_ENGINE_METRICS_LISTEN_ADDRESS: "0.0.0.0:9090"
      SENTINEL_CORRELATION_ENGINE_TLS_ENABLED: "false"
    ports:
      - "50051:50051"
      - "9090:9090"
    volumes:
      - ../config:/etc/sentinel/config:ro
    networks:
      - sentinel-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      scylladb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/grpc_health_probe", "-addr=:50051"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "4.0"
        reservations:
          memory: 1G
          cpus: "1.0"

  audit-ledger:
    image: sentinel/audit-ledger:latest
    build:
      context: ../audit-ledger
      dockerfile: packaging/Dockerfile
    container_name: sentinel-audit-ledger
    restart: unless-stopped
    environment:
      <<: *common-env
      SENTINEL_AUDIT_LEDGER_LISTEN_ADDRESS: "0.0.0.0:50052"
      SENTINEL_AUDIT_LEDGER_STORAGE_SCYLLA_CONTACT_POINTS: "scylladb:9042"
      SENTINEL_AUDIT_LEDGER_METRICS_LISTEN_ADDRESS: "0.0.0.0:9091"
      SENTINEL_AUDIT_LEDGER_TLS_ENABLED: "false"
    ports:
      - "50052:50052"
      - "9091:9091"
    volumes:
      - ../config:/etc/sentinel/config:ro
    networks:
      - sentinel-net
    depends_on:
      scylladb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/grpc_health_probe", "-addr=:50052"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"

  # ---------------------------------------------------------------------------
  # Data Stores
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:16-alpine
    container_name: sentinel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
      POSTGRES_DB: sentinel
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - sentinel-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 256M
          cpus: "0.25"

  redis:
    image: redis:7-alpine
    container_name: sentinel-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 60 1000
      --save 300 100
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - sentinel-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.1"

  scylladb:
    image: scylladb/scylla:5.4
    container_name: sentinel-scylladb
    restart: unless-stopped
    command: >
      --seeds=scylladb
      --smp 2
      --memory 2G
      --overprovisioned 1
      --api-address 0.0.0.0
    ports:
      - "9042:9042"
      - "9180:9180"
    volumes:
      - scylla-data:/var/lib/scylla
    networks:
      - sentinel-net
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -q UN"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "4.0"
        reservations:
          memory: 2G
          cpus: "2.0"

  # ---------------------------------------------------------------------------
  # Observability Stack
  # ---------------------------------------------------------------------------

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: sentinel-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    ports:
      - "9092:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - sentinel-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"

  grafana:
    image: grafana/grafana:10.4.0
    container_name: sentinel-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: sentinel
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3000"
      GF_INSTALL_PLUGINS: ""
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - sentinel-net
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  sentinel-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  scylla-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
